<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>歴史ログ</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%237a5c3e'/><text x='50' y='55' font-size='60' text-anchor='middle' dominant-baseline='central' fill='%23f6f3ec' font-family='sans-serif'>歴</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%237a5c3e'/><text x='50' y='55' font-size='60' text-anchor='middle' dominant-baseline='central' fill='%23f6f3ec' font-family='sans-serif'>歴</text></svg>">
<style>
  :root{
    --bg:#f6f3ec; --surface:#ffffff; --ink:#2c2722; --muted:#7c736a;
    --line:#e5ded2; --accent:#7a5c3e; --accent-soft:#efe7da;
    --new:#1d7a55; --new-soft:#e1f1ea; --danger:#a3402d;
    --radius:14px; --shadow:0 1px 2px rgba(0,0,0,.05);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.7;
    padding-bottom:76px; -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:640px;margin:0 auto;padding:16px}
  header.app{
    position:sticky;top:0;z-index:5;background:var(--bg);
    padding:14px 16px 10px;border-bottom:1px solid var(--line);
    display:flex;align-items:baseline;gap:8px
  }
  header.app h1{font-size:19px;margin:0;font-weight:600;letter-spacing:.02em}
  header.app .sub{font-size:12px;color:var(--muted)}

  /* views */
  .view{display:none}
  .view.active{display:block}

  /* record */
  textarea{
    width:100%;min-height:160px;padding:14px;border:1px solid var(--line);
    border-radius:var(--radius);font-size:16px;font-family:inherit;line-height:1.7;
    background:var(--surface);resize:vertical;color:var(--ink)
  }
  textarea:focus,input:focus{outline:none;border-color:var(--accent)}
  .row{display:flex;gap:8px;align-items:center;margin-top:10px}
  input.src{
    flex:1;padding:11px 12px;border:1px solid var(--line);border-radius:10px;
    font-size:15px;background:var(--surface);font-family:inherit;color:var(--ink)
  }
  .label{font-size:13px;color:var(--muted);margin:4px 2px}
  button.primary{
    width:100%;margin-top:12px;padding:15px;border:none;border-radius:var(--radius);
    background:var(--accent);color:#fff;font-size:17px;font-weight:600;
    font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px
  }
  button.primary:disabled{opacity:.55}
  .result{
    margin-top:14px;padding:13px 14px;border-radius:12px;background:var(--new-soft);
    color:var(--new);font-size:14px;display:none;border:1px solid #cfe8dd
  }
  .result.err{background:#f7e7e3;color:var(--danger);border-color:#eccabf}
  .result.show{display:block}
  .result.clickable{cursor:pointer}
  .result-more{display:block;margin-top:5px;font-size:12px;opacity:.85;font-weight:500}
  .rev-card{margin-top:24px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
  .rev-head{font-size:12px;color:var(--muted);margin-bottom:8px}
  .rev-name{font-size:17px;font-weight:600}
  .rev-meta{font-size:12px;color:var(--muted);margin:3px 0 8px}
  .rev-sum{font-size:13px;line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .rev-actions{display:flex;gap:8px;margin-top:13px}
  .rev-actions button{flex:1;padding:10px;border:1px solid var(--line);background:var(--surface);color:var(--accent);border-radius:10px;font-size:13px;font-family:inherit;cursor:pointer}
  .rev-actions button.primary-act{background:var(--accent);color:#fff;border-color:var(--accent)}
  .spinner{
    width:18px;height:18px;border:2.5px solid rgba(255,255,255,.4);
    border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  /* filters */
  .filter-row{margin-bottom:2px}
  .filter-label{font-size:11px;color:var(--muted);margin:6px 2px 2px;display:block}
  .chips{display:flex;gap:8px;overflow-x:auto;padding:2px 0 6px;-webkit-overflow-scrolling:touch}
  .chip{
    flex:0 0 auto;padding:6px 13px;border-radius:20px;border:1px solid var(--line);
    background:var(--surface);font-size:13px;color:var(--muted);cursor:pointer;white-space:nowrap
  }
  .chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}

  /* timeline */
  .tl{position:relative;margin-left:6px;padding-left:20px;border-left:2px solid var(--line)}
  .tl-group{position:relative;padding:0 0 22px}
  .tl-group::before{
    content:"";position:absolute;left:-27px;top:4px;width:11px;height:11px;border-radius:50%;
    background:var(--accent);border:2px solid var(--bg)
  }
  .tl-era{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:2px}
  .card{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:12px 14px;margin-top:8px;cursor:pointer;box-shadow:var(--shadow)
  }
  .card.fresh{border-color:var(--new);background:var(--new-soft)}
  .new-badge{display:inline-block;font-size:10px;margin-left:8px;padding:1px 7px;border-radius:10px;background:var(--new);color:#fff;vertical-align:2px;font-weight:500}
  .card .name{font-size:16px;font-weight:600}
  .card-sum{font-size:13px;color:var(--muted);margin-top:5px;line-height:1.5;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card .meta{font-size:12px;color:var(--muted);margin-top:6px}
  .tag{display:inline-block;font-size:11px;padding:1px 8px;border-radius:10px;background:var(--accent-soft);color:var(--accent);margin-right:5px}
  .tag.ty-person{background:#E6F1FB;color:#0C447C}
  .tag.ty-event{background:#FAECE7;color:#993C1D}
  .tag.ty-place{background:#EAF3DE;color:#3B6D11}
  .tag.ty-theme{background:#EEEDFE;color:#3C3489}
  .tag.ty-other{background:#F1EFE8;color:#444441}
  .ty-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:1px}
  .count{color:var(--accent);font-weight:600}
  .empty{text-align:center;color:var(--muted);padding:48px 16px;font-size:14px}

  /* detail overlay */
  .overlay{
    position:fixed;inset:0;background:rgba(40,34,28,.45);z-index:20;display:none;
    align-items:flex-end;justify-content:center
  }
  .overlay.show{display:flex}
  .sheet{
    background:var(--bg);width:100%;max-width:640px;max-height:90vh;overflow-y:auto;
    border-radius:20px 20px 0 0;padding:20px 18px 40px;-webkit-overflow-scrolling:touch
  }
  .sheet .close{float:right;border:none;background:none;font-size:26px;color:var(--muted);cursor:pointer;line-height:1;padding:0 4px}
  .sheet h2{font-size:21px;margin:4px 0 2px}
  .sheet .d-meta{font-size:13px;color:var(--muted);margin-bottom:14px}
  .summary{background:var(--accent-soft);border-radius:12px;padding:13px 14px;font-size:15px;margin-bottom:18px}
  .layers-h{font-size:13px;color:var(--muted);margin-bottom:10px}
  .layer{border-left:2px solid var(--line);padding:0 0 14px 14px;position:relative}
  .layer::before{content:"";position:absolute;left:-5px;top:6px;width:8px;height:8px;border-radius:50%;background:var(--accent)}
  .layer .when{font-size:11px;color:var(--muted)}
  .layer .fact{font-size:15px}
  .rel-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
  .rel-chip{padding:7px 13px;border:1px solid var(--line);background:var(--surface);color:var(--accent);border-radius:18px;font-size:13px;font-family:inherit;cursor:pointer}
  .rel-chip:active{background:var(--accent-soft)}
  .del{margin-top:20px;width:100%;padding:12px;border:1px solid #eccabf;background:#f7e7e3;color:var(--danger);border-radius:12px;font-size:14px;font-family:inherit;cursor:pointer}
  .edit-btn{width:100%;margin-top:10px;padding:12px;border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:12px;font-size:14px;font-family:inherit;cursor:pointer}
  .ef{margin-bottom:12px}
  .ef label{display:block;font-size:13px;color:var(--muted);margin-bottom:5px}
  .ef input,.ef select{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:16px;background:var(--surface);font-family:inherit;color:var(--ink)}
  .ef input:focus,.ef select:focus{outline:none;border-color:var(--accent)}
  .fresh-toggle{margin-bottom:10px;padding:8px 16px;border:1px solid var(--new);background:var(--surface);color:var(--new);border-radius:20px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer}
  .fresh-toggle.on{background:var(--new);color:#fff}
  .search-box{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-size:15px;background:var(--surface);margin-bottom:8px;font-family:inherit;color:var(--ink)}
  .search-box:focus{outline:none;border-color:var(--accent)}

  /* settings */
  .field{margin-bottom:18px}
  .field label{display:block;font-size:14px;font-weight:600;margin-bottom:6px}
  .field .hint{font-size:12px;color:var(--muted);margin-bottom:8px}
  .field input{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;font-size:15px;background:var(--surface);font-family:inherit;color:var(--ink)}
  .saved{font-size:13px;color:var(--new);margin-top:6px;display:none}
  .saved.show{display:inline}

  /* bottom nav */
  nav.tabs{
    position:fixed;bottom:0;left:0;right:0;z-index:10;background:var(--surface);
    border-top:1px solid var(--line);display:flex;padding-bottom:env(safe-area-inset-bottom)
  }
  nav.tabs button{
    flex:1;border:none;background:none;padding:11px 4px 9px;font-family:inherit;
    font-size:11px;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px
  }
  nav.tabs button .ic{font-size:21px;line-height:1}
  nav.tabs button.on{color:var(--accent)}

  /* auth */
  #auth-screen{position:fixed;inset:0;background:var(--bg);z-index:50;display:flex;align-items:center;justify-content:center;padding:24px}
  #auth-screen.hide{display:none}
  .auth-card{width:100%;max-width:360px;text-align:center}
  .auth-card h1{font-size:27px;margin:0;letter-spacing:.03em}
  .auth-sub{font-size:13px;color:var(--muted);margin:8px 0 26px}
  .auth-card input{width:100%;padding:14px;margin-bottom:10px;border:1px solid var(--line);border-radius:10px;font-size:16px;background:var(--surface);font-family:inherit;color:var(--ink)}
  .auth-card input:focus{outline:none;border-color:var(--accent)}
  .auth-alt{margin-top:14px;background:none;border:none;color:var(--accent);font-size:14px;font-family:inherit;cursor:pointer;text-decoration:underline}
  .auth-msg{margin-top:16px;font-size:14px;min-height:20px;line-height:1.5}
  .auth-msg.err{color:var(--danger)}
  .auth-msg.ok{color:var(--new)}
  .btn-logout{margin-top:14px;width:100%;padding:12px;border:1px solid var(--line);background:var(--surface);color:var(--muted);border-radius:10px;font-size:14px;font-family:inherit;cursor:pointer}
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://icxbyltorjpfexmwxzga.supabase.co';
const SUPABASE_KEY = 'sb_publishable_6qgfCo_xbhbjb3Lr__j-Yg_Y7Zk2yWH';
const supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const GEMINI_MODEL = 'gemini-2.5-flash';

const $ = s => document.querySelector(s);
const esc = s => (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const norm = s => (s||'').trim();
function typeClass(t){ return ({'人物':'ty-person','出来事':'ty-event','地域':'ty-place','テーマ':'ty-theme'})[t] || 'ty-other'; }
function typeColor(t){ return ({'人物':'#378ADD','出来事':'#D85A30','地域':'#639922','テーマ':'#7F77DD'})[t] || '#888780'; }

/* ---------- タブ切替 ---------- */
let activeFilter = 'すべて';
let activeType = 'すべて';
let searchQuery = '';
let freshOnly = false;
let sortByGrown = false;
let lastUpdate = null;
$('#search').oninput = e => { searchQuery = e.target.value.trim(); renderTimeline(); };
$('#fresh-toggle').onclick = () => { freshOnly = !freshOnly; $('#fresh-toggle').classList.toggle('on', freshOnly); renderTimeline(); };
$('#sort-toggle').onclick = () => { sortByGrown = !sortByGrown; $('#sort-toggle').classList.toggle('on', sortByGrown); renderTimeline(); };
document.querySelectorAll('nav.tabs button').forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll('nav.tabs button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    const v = b.dataset.view;
    document.querySelectorAll('.view').forEach(s=>s.classList.remove('active'));
    $('#v-'+v).classList.add('active');
    if(v==='timeline') loadTimeline();
    if(v==='record') loadReview();
  };
});

/* ---------- 設定（Geminiキー） ---------- */
$('#gkey').value = localStorage.getItem('gemini_key') || '';
$('#au-email').value = localStorage.getItem('last_email') || '';
$('#btn-savekey').onclick = ()=>{
  localStorage.setItem('gemini_key', $('#gkey').value.trim());
  const s=$('#gsaved'); s.classList.add('show'); setTimeout(()=>s.classList.remove('show'),1800);
};

/* ---------- Gemini 呼び出し ---------- */
const sleep = ms => new Promise(r=>setTimeout(r,ms));
const isNetErr = m => /load failed|failed to fetch|networkerror|network error|fetch/i.test(m||'');
// Supabase通信を、一時的な通信エラーなら自動で数回リトライする
async function dbRetry(fn, label){
  let lastErr;
  for(let a=0;a<3;a++){
    if(a>0){ $('#btn-label').textContent='通信を再試行中…'; await sleep(800*a); }
    const { data, error } = await fn();
    if(!error) return data;
    lastErr = error;
    if(!isNetErr(error.message)) break;   // 通信以外のエラーは即やめる
  }
  const e = new Error((lastErr && lastErr.message) || '失敗'); e._label = label; throw e;
}
async function geminiCall(prompt){
  const key = localStorage.getItem('gemini_key');
  if(!key) throw new Error('NO_KEY');
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${key}`;
  const body = JSON.stringify({ contents:[{parts:[{text:prompt}]}], generationConfig:{ responseMimeType:'application/json', temperature:0.2 } });
  let lastErr;
  for(let attempt=0; attempt<4; attempt++){
    if(attempt>0){ $('#btn-label').textContent='混雑のため再試行中…'; await sleep(900*Math.pow(2,attempt-1)); }
    let res;
    try{ res = await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body}); }
    catch(e){ lastErr=e; continue; }
    if(res.ok) return res;
    const t = await res.text().catch(()=>'');
    lastErr = new Error('GEMINI '+res.status+': '+t.slice(0,160));
    if([429,500,503].includes(res.status)) continue;   // 一時的なものは再試行
    throw lastErr;                                       // それ以外は即エラー
  }
  throw lastErr;
}

async function extractItems(rawText, existingItems){
  const existingList = existingItems.length
    ? existingItems.map(i=>`- ${i.name}${i.summary?'：'+i.summary:''}`).join('\n')
    : '（まだありません）';
  const prompt = `あなたは歴史データベースの整理係です。下の「今日のテキスト」から、歴史上の項目（人物・出来事・テーマ・地域・その他）を抽出してください。

【既存の項目リスト】同じ対象を指すならこの名前をそのまま使い、重複を作らないこと。
${existingList}

【今日のテキスト】
"""
${rawText}
"""

各項目について次をJSONで返してください。キーは items（配列）。各要素:
- name: 項目名。既存リストに同じ対象があればその名前を使う。人物は一般的な表記に正規化（例「信長」→「織田信長」）。
- type: 「人物」「出来事」「テーマ」「地域」「その他」のいずれか。
- sort_year: 並べ替え用の代表年。西暦の整数。紀元前はマイナス（例 紀元前49年→-49、1560年→1560）。不明なら null。
- era_label: 表示用の年代ラベル（例「紀元前49年」「室町時代」「1世紀頃」）。不明なら空文字。
- region: 地域（例「ローマ」「日本」）。不明なら空文字。
- theme: テーマ/ジャンル（例「ローマ史」「戦国」「科学史」）。テキスト全体の文脈から推定。
- new_fact: 今日のテキストから分かるこの項目の事実を1〜2文で簡潔に。
- updated_summary: この項目の要約。既存要約があれば new_fact を統合して書き直す。なければ new_fact を元に新規作成。3文以内。

注意: 実質的な歴史的内容が無いものは項目にしない。出力はJSONのみ。`;

  const res = await geminiCall(prompt);
  const data = await res.json();
  let txt = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
  txt = txt.replace(/^```json\s*/i,'').replace(/```$/,'').trim();
  const parsed = JSON.parse(txt);
  return Array.isArray(parsed) ? parsed : (parsed.items || []);
}

/* ---------- 更新フロー ---------- */
$('#btn-update').onclick = async ()=>{
  const raw = $('#raw').value.trim();
  if(!raw){ showResult('テキストを貼り付けてください。', true); return; }
  if(!localStorage.getItem('gemini_key')){ showResult('先に「設定」でGemini APIキーを保存してください。', true); return; }

  setLoading(true);
  hideResult();
  try{
    // 1) 既存項目を取得（AIに渡して重複防止）
    const existing = await dbRetry(()=>supa.from('hist_items').select('id,name,summary'), '既存項目の取得');
    const map = new Map(existing.map(i=>[norm(i.name).toLowerCase(), i]));

    // 2) AIで抽出（混雑時は自動で数回リトライ）
    const items = await extractItems(raw, existing);
    if(!items.length){ showResult('歴史的な項目を見つけられませんでした。文章を変えて試してみてください。', true); setLoading(false); return; }

    // 3) AI成功後に元テキストを保存（やり直し用に丸ごと残す。失敗時は無駄な重複を残さない）
    const entry = await dbRetry(()=>supa
      .from('hist_entries').insert({ raw_text: raw, source: null, user_id: currentUid })
      .select().single(), '記録の保存');

    // 4) 項目をupsert＋知識の層を追加
    let grewList=[], bornList=[];
    for(const it of items){
      const name = norm(it.name);
      if(!name) continue;
      const fields = {
        type: it.type||'その他', name,
        sort_year: Number.isFinite(it.sort_year)? Math.round(it.sort_year): null,
        era_label: it.era_label||'', region: it.region||'', theme: it.theme||'',
        summary: it.updated_summary||it.new_fact||'', user_id: currentUid
      };
      const key = name.toLowerCase();
      let itemId;
      if(map.has(key)){
        const ex = map.get(key);
        await dbRetry(()=>supa.from('hist_items').update({...fields, updated_at:new Date().toISOString()}).eq('id', ex.id), '項目の更新');
        itemId = ex.id; grewList.push({id:itemId, name});
      }else{
        const ni = await dbRetry(()=>supa.from('hist_items').insert(fields).select().single(), '項目の作成');
        itemId = ni.id; bornList.push({id:itemId, name});
        map.set(key, ni);
      }
      if(it.new_fact){
        await dbRetry(()=>supa.from('hist_facts').insert({ item_id:itemId, entry_id:entry.id, fact_text: it.new_fact, user_id: currentUid }), '情報の追加');
      }
    }

    $('#raw').value='';
    lastUpdate = { grew: grewList, born: bornList };
    showUpdateResult(grewList.length, bornList.length);
  }catch(err){
    console.error(err);
    if(err.message==='NO_KEY') showResult('Gemini APIキーが未設定です。「設定」で保存してください。', true);
    else if(/503|UNAVAILABLE|high demand|overload|429/i.test(err.message||'')) showResult('Geminiが今とても混み合っています。少し時間をおいて、もう一度「更新する」を押してください。（あなたのテキストは消えていません）', true);
    else if(isNetErr(err.message)) showResult('通信に失敗しました。電波の良い場所で、少し待ってからもう一度「更新する」を押してください。（テキストは消えていません）', true);
    else showResult('うまくいきませんでした：'+(err._label?('['+err._label+'] '):'')+(err.message||err), true);
  }
  setLoading(false);
};

function setLoading(on){
  $('#btn-update').disabled = on;
  $('#btn-label').innerHTML = on ? '<span class="spinner"></span>' : '更新する';
}
function showResult(msg, isErr){
  const r=$('#result'); r.onclick=null; r.textContent=msg; r.className='result show'+(isErr?' err':'');
}
function hideResult(){ const r=$('#result'); r.onclick=null; r.className='result'; }
function showUpdateResult(g,b){
  const r=$('#result'); r.className='result show clickable';
  r.innerHTML=`✨ ${g}項目が育ち、${b}項目が新しく生まれました。<span class="result-more">タップで内容を見る ›</span>`;
  r.onclick=showUpdateDetail;
}
function showUpdateDetail(){
  if(!lastUpdate) return;
  const sec=(title,arr,mark)=> arr.length? `<div class="layers-h" style="margin-top:14px">${mark} ${title}（${arr.length}）</div><div class="rel-wrap">${arr.map(x=>`<button class="rel-chip" data-rid="${x.id}">${esc(x.name)}</button>`).join('')}</div>`:'';
  $('#sheet').innerHTML=`<button class="close" id="u-close">×</button>
    <h2 style="margin-bottom:6px">今回の更新</h2>
    <div class="d-meta">この更新で増えた項目です。タップで開けます。</div>
    ${sec('新しく生まれた', lastUpdate.born, '🌱')}
    ${sec('育った（情報が増えた）', lastUpdate.grew, '📈')}`;
  $('#u-close').onclick=closeDetail;
  $('#sheet').querySelectorAll('.rel-chip').forEach(c=>c.onclick=()=>openDetail(c.dataset.rid));
  $('#overlay').classList.add('show');
}

/* ---------- 年表 ---------- */
let allItems=[], factCounts={};
async function loadTimeline(){
  const wrap=$('#tl-wrap');
  wrap.innerHTML='<div class="empty">読み込み中…</div>';
  const { data: items, error } = await supa.from('hist_items')
    .select('*').order('sort_year',{ascending:true,nullsFirst:false});
  if(error){ wrap.innerHTML='<div class="empty">読み込みに失敗しました</div>'; return; }
  allItems = items||[];
  // fact数
  const { data: facts } = await supa.from('hist_facts').select('item_id');
  factCounts={}; (facts||[]).forEach(f=>factCounts[f.item_id]=(factCounts[f.item_id]||0)+1);
  updateFreshToggle(); renderTypeChips(); renderChips(); renderTimeline();
}
/* ---------- 今日の振り返り（ランダム復習） ---------- */
async function loadReview(){
  if(!allItems.length){
    const { data } = await supa.from('hist_items').select('*');
    allItems = data || [];
  }
  pickReview();
}
function pickReview(){
  const wrap=$('#review');
  if(!allItems.length){ wrap.style.display='none'; return; }
  const i = allItems[Math.floor(Math.random()*allItems.length)];
  const meta=[i.era_label,i.region,i.theme].filter(Boolean).join(' ・ ');
  wrap.style.display='block';
  wrap.innerHTML=`<div class="rev-card">
    <div class="rev-head">📖 今日の振り返り</div>
    <div class="rev-name">${esc(i.name)} <span class="tag ${typeClass(i.type)}">${esc(i.type||'その他')}</span></div>
    <div class="rev-meta">${esc(meta)}</div>
    ${i.summary?`<div class="rev-sum">${esc(i.summary)}</div>`:''}
    <div class="rev-actions">
      <button class="primary-act" id="rev-open">この項目を開く</button>
      <button id="rev-next">次の項目へ →</button>
    </div></div>`;
  $('#rev-open').onclick=()=>openDetail(i.id);
  $('#rev-next').onclick=pickReview;
}
function updateFreshToggle(){
  const n = allItems.filter(i=>i.updated_at && (Date.now()-new Date(i.updated_at).getTime()<FRESH_MS)).length;
  $('#fresh-toggle').textContent = n? `新着だけ（${n}）` : '新着だけ';
}
function renderTypeChips(){
  const order = ['人物','出来事','テーマ','地域','その他'];
  const present = order.filter(t => allItems.some(i=>i.type===t));
  const chips = ['すべて', ...present];
  if(!chips.includes(activeType)) activeType='すべて';
  $('#type-chips').innerHTML = chips.map(c=>{
    const dot = c!=='すべて' ? `<span class="ty-dot" style="background:${typeColor(c)}"></span>` : '';
    return `<div class="chip${c===activeType?' on':''}" data-c="${esc(c)}">${dot}${esc(c)}</div>`;
  }).join('');
  $('#type-chips').querySelectorAll('.chip').forEach(ch=>ch.onclick=()=>{activeType=ch.dataset.c;renderTypeChips();renderTimeline();});
}
function renderChips(){
  const themes = [...new Set(allItems.map(i=>i.theme).filter(Boolean))];
  const chips=['すべて',...themes];
  if(!chips.includes(activeFilter)) activeFilter='すべて';
  $('#chips').innerHTML = chips.map(c=>`<div class="chip${c===activeFilter?' on':''}" data-c="${esc(c)}">${esc(c)}</div>`).join('');
  $('#chips').querySelectorAll('.chip').forEach(ch=>ch.onclick=()=>{activeFilter=ch.dataset.c;renderChips();renderTimeline();});
}
const FRESH_MS = 24*60*60*1000;
function cardHtml(i){
  const fresh = i.updated_at && (Date.now()-new Date(i.updated_at).getTime() < FRESH_MS);
  const sum = (i.summary||'').trim();
  return `<div class="card${fresh?' fresh':''}" data-id="${i.id}">
        <div class="name">${esc(i.name)}${fresh?'<span class="new-badge">新着</span>':''}</div>
        ${sum?`<div class="card-sum">${esc(sum)}</div>`:''}
        <div class="meta"><span class="tag ${typeClass(i.type)}">${esc(i.type||'その他')}</span>${i.region?esc(i.region)+' ・ ':''}<span class="count">${factCounts[i.id]||0}件の情報</span></div>
      </div>`;
}
function renderTimeline(){
  const wrap=$('#tl-wrap');
  let list = activeFilter==='すべて'? allItems : allItems.filter(i=>i.theme===activeFilter);
  if(activeType!=='すべて') list = list.filter(i=>i.type===activeType);
  if(searchQuery) list = list.filter(i=>(i.name||'').toLowerCase().includes(searchQuery.toLowerCase()));
  if(freshOnly) list = list.filter(i=>i.updated_at && (Date.now()-new Date(i.updated_at).getTime()<FRESH_MS));
  if(!list.length){ wrap.innerHTML='<div class="empty">'+(freshOnly?'最近24時間の新着はありません。':'まだ項目がありません。<br>「記録」から聴いた内容を貼って更新してみましょう。')+'</div>'; return; }
  if(sortByGrown){
    // 最終更新が新しい順のフラット一覧（era区分なし）
    list = [...list].sort((a,b)=> new Date(b.updated_at||0) - new Date(a.updated_at||0));
    wrap.innerHTML = '<div class="tl"><div class="tl-group">'+list.map(cardHtml).join('')+'</div></div>';
    wrap.querySelectorAll('.card').forEach(c=>c.onclick=()=>openDetail(c.dataset.id));
    return;
  }
  // 同じ時代区分（era_label）でまとめる
  const groups=[]; const idx=new Map();
  for(const it of list){
    const key = it.era_label || '年代不明';
    if(!idx.has(key)){ idx.set(key, groups.length); groups.push({era:key, items:[]}); }
    groups[idx.get(key)].items.push(it);
  }
  wrap.innerHTML = '<div class="tl">'+groups.map(g=>`
    <div class="tl-group">
      <div class="tl-era">${esc(g.era)}</div>
      ${g.items.map(cardHtml).join('')}
    </div>`).join('')+'</div>';
  wrap.querySelectorAll('.card').forEach(c=>c.onclick=()=>openDetail(c.dataset.id));
}

/* ---------- 項目詳細 ---------- */
async function openDetail(id){
  let item = allItems.find(i=>String(i.id)===String(id));
  if(!item){                                  // キャッシュに無ければDBから直接取得（生まれたての項目対策）
    const { data } = await supa.from('hist_items').select('*').eq('id', id).single();
    item = data;
  }
  if(!item) return;
  const { data: facts } = await supa.from('hist_facts').select('*').eq('item_id',id).order('added_date',{ascending:true});
  // 関連項目: 同じ文章(entry)から一緒に生まれた他の項目ほど関連が深い
  let relatedHtml = '';
  const entryIds = [...new Set((facts||[]).map(f=>f.entry_id).filter(Boolean))];
  if(entryIds.length){
    const { data: co } = await supa.from('hist_facts').select('item_id,entry_id').in('entry_id', entryIds);
    const counts={}; (co||[]).forEach(r=>{ if(String(r.item_id)!==String(id)) counts[r.item_id]=(counts[r.item_id]||0)+1; });
    const byId = new Map(allItems.map(i=>[String(i.id), i]));
    const related = Object.keys(counts).map(k=>({id:k,n:counts[k],item:byId.get(String(k))}))
      .filter(x=>x.item).sort((a,b)=>b.n-a.n).slice(0,8);
    if(related.length){
      relatedHtml = `<div class="layers-h" style="margin-top:18px">🔗 関連する項目</div>
        <div class="rel-wrap">${related.map(r=>`<button class="rel-chip" data-rid="${r.id}">${esc(r.item.name)}</button>`).join('')}</div>`;
    }
  }
  const layers = (facts||[]).map(f=>`
    <div class="layer">
      <div class="when">${fmtDate(f.added_date)}に追加</div>
      <div class="fact">${esc(f.fact_text)}</div>
    </div>`).join('') || '<div class="empty" style="padding:20px">情報がまだありません</div>';
  const meta = [item.era_label, item.region, item.theme].filter(Boolean).join(' ・ ');
  $('#sheet').innerHTML = `
    <button class="close" id="d-close">×</button>
    <div class="tag ${typeClass(item.type)}">${esc(item.type||'その他')}</div>
    <h2>${esc(item.name)}</h2>
    <div class="d-meta">${esc(meta)}</div>
    ${item.summary?`<div class="summary">${esc(item.summary)}</div>`:''}
    <div class="layers-h">積み重なった知識</div>
    ${layers}
    ${relatedHtml}
    <button class="edit-btn" id="d-edit">この項目を編集</button>
    <button class="del" id="d-del">この項目を削除</button>`;
  $('#d-close').onclick=closeDetail;
  $('#sheet').querySelectorAll('.rel-chip').forEach(c=>c.onclick=()=>openDetail(c.dataset.rid));
  $('#d-edit').onclick=()=>openEdit(item);
  $('#d-del').onclick=async()=>{
    if(!confirm(`「${item.name}」を削除しますか？（この項目の情報も消えます）`)) return;
    await supa.from('hist_items').delete().eq('id',id);
    closeDetail(); loadTimeline();
  };
  $('#overlay').classList.add('show');
}
function openEdit(item){
  const types=['人物','出来事','テーマ','地域','その他'];
  $('#sheet').innerHTML = `
    <button class="close" id="e-close">×</button>
    <h2 style="margin-bottom:14px">項目を編集</h2>
    <div class="ef"><label>名前</label><input id="e-name" value="${esc(item.name)}"></div>
    <div class="ef"><label>種類</label><select id="e-type">${types.map(t=>`<option ${t===(item.type||'その他')?'selected':''}>${t}</option>`).join('')}</select></div>
    <div class="ef"><label>テーマ（例: ローマ史、戦国）</label><input id="e-theme" value="${esc(item.theme||'')}"></div>
    <div class="ef"><label>地域（例: 日本、ローマ）</label><input id="e-region" value="${esc(item.region||'')}"></div>
    <div class="ef"><label>年代ラベル（表示用・例: 室町時代）</label><input id="e-era" value="${esc(item.era_label||'')}"></div>
    <div class="ef"><label>並べ替え用の年（西暦の数字・紀元前はマイナス）</label><input id="e-year" type="number" value="${item.sort_year??''}"></div>
    <button class="primary" id="e-save" style="margin-top:8px">保存する</button>
    <button class="edit-btn" id="e-back">もどる</button>`;
  $('#e-close').onclick=closeDetail;
  $('#e-back').onclick=()=>openDetail(item.id);
  $('#e-save').onclick=async()=>{
    const name=$('#e-name').value.trim();
    if(!name){ alert('名前を入れてください'); return; }
    const yv=$('#e-year').value.trim();
    const { error } = await supa.from('hist_items').update({
      name, type:$('#e-type').value, theme:$('#e-theme').value.trim(),
      region:$('#e-region').value.trim(), era_label:$('#e-era').value.trim(),
      sort_year: yv===''? null : Math.round(Number(yv)), updated_at:new Date().toISOString()
    }).eq('id', item.id);
    if(error){
      if(/duplicate|23505|unique/i.test(error.message)) alert('その名前の項目は既にあります。（同じ名前への統合機能は今後の改善で対応します）');
      else alert('保存できませんでした：'+error.message);
      return;
    }
    closeDetail(); await loadTimeline();
  };
}
function closeDetail(){ $('#overlay').classList.remove('show'); }
$('#overlay').onclick=e=>{ if(e.target===$('#overlay')) closeDetail(); };
function fmtDate(s){ const d=new Date(s); return `${d.getMonth()+1}月${d.getDate()}日`; }

/* ---------- 認証（ログイン制） ---------- */
let currentUid = null;
const authScreen = $('#auth-screen');
function authMsg(m, ok){ const e=$('#au-msg'); e.textContent=m; e.className='auth-msg'+(m?(ok?' ok':' err'):''); }

supa.auth.onAuthStateChange((_e, session)=>{
  if(session && session.user){
    currentUid = session.user.id;
    authScreen.classList.add('hide');
    $('#who').textContent = 'ログイン中：'+(session.user.email||'');
    if(session.user.email) localStorage.setItem('last_email', session.user.email);
    loadReview();
  }else{
    currentUid = null;
    authScreen.classList.remove('hide');
  }
});

(async ()=>{
  const { data } = await supa.auth.getSession();
  if(data.session && data.session.user){
    currentUid = data.session.user.id;
    authScreen.classList.add('hide');
    $('#who').textContent = 'ログイン中：'+(data.session.user.email||'');
    loadReview();
  }else{
    authScreen.classList.remove('hide');
  }
})();

$('#au-login').onclick = async ()=>{
  authMsg('');
  const email=$('#au-email').value.trim(), pass=$('#au-pass').value;
  if(!email||!pass){ authMsg('メールとパスワードを入れてください'); return; }
  $('#au-login').disabled=true;
  const { error } = await supa.auth.signInWithPassword({ email, password: pass });
  $('#au-login').disabled=false;
  if(error) authMsg('ログインできませんでした：'+error.message);
};
$('#au-signup').onclick = async ()=>{
  authMsg('');
  const email=$('#au-email').value.trim(), pass=$('#au-pass').value;
  if(!email||!pass){ authMsg('メールとパスワードを入れてください'); return; }
  if(pass.length<6){ authMsg('パスワードは6文字以上にしてください'); return; }
  const { data, error } = await supa.auth.signUp({ email, password: pass });
  if(error){ authMsg('登録できませんでした：'+error.message); return; }
  if(data.session) authMsg('登録してログインしました。', true);
  else authMsg('確認メールを送りました。メール内のリンクを押したあと、ここで同じメール・パスワードで「ログイン」してください。', true);
};
$('#btn-logout').onclick = async ()=>{
  await supa.auth.signOut();
};

/* ---------- バックアップ書き出し ---------- */
function buildBackupMd(items, facts){
  const byItem={}; (facts||[]).forEach(f=>{(byItem[f.item_id]=byItem[f.item_id]||[]).push(f);});
  let md = `# 歴史ログ バックアップ\n\n書き出し日: ${new Date().toLocaleDateString('ja-JP')}\n全${(items||[]).length}項目\n\n`;
  (items||[]).forEach(it=>{
    md += `## ${it.name}\n\n`;
    const meta=[it.type,it.era_label,it.region,it.theme].filter(Boolean).join(' / ');
    if(meta) md += `*${meta}*\n\n`;
    if(it.summary) md += `${it.summary}\n\n`;
    const fs=byItem[it.id]||[];
    if(fs.length){ md+=`### 積み重なった知識\n`; fs.forEach(f=>{ md+=`- (${fmtDate(f.added_date)}) ${f.fact_text}\n`; }); md+=`\n`; }
  });
  return md;
}
$('#btn-export').onclick = async ()=>{
  const b=$('#btn-export'); b.disabled=true; b.textContent='書き出し中…';
  try{
    const { data: items } = await supa.from('hist_items').select('*').order('sort_year',{ascending:true,nullsFirst:false});
    const { data: facts } = await supa.from('hist_facts').select('*').order('added_date',{ascending:true});
    const md = buildBackupMd(items, facts);
    const blob = new Blob([md],{type:'text/markdown;charset=utf-8'});
    const url=URL.createObjectURL(blob); const a=document.createElement('a');
    a.href=url; a.download=`歴史ログ_${new Date().toISOString().slice(0,10)}.md`;
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  }catch(e){ alert('書き出しに失敗しました：'+(e.message||e)); }
  b.disabled=false; b.textContent='全データを書き出す';
};
